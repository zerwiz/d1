<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>d1 Planning Hub</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100vh;
      margin: 0;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    #sidebar {
      width: 260px;
      background: #252526;
      padding: 16px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
    }
    #sidebar.drag-over {
      background: #3e3e42;
      border-right: 2px dashed #007acc;
    }
    #sidebar h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
      color: #ccc;
    }
    #file-search {
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1px solid #404040;
      border-radius: 4px;
      background: #3d3d3d;
      color: #fff;
      font-size: 13px;
      width: 100%;
    }
    #file-search::placeholder { color: #888; }
    #file-search:focus {
      outline: none;
      border-color: #007acc;
    }
    #file-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
    }
    #file-list li {
      padding: 8px 10px;
      margin-bottom: 4px;
      border-radius: 4px;
      font-size: 13px;
      word-break: break-all;
    }
    #file-list li.folder {
      background: #2d2d30;
      color: #9cdcfe;
    }
    #file-list li.file {
      background: #333;
      color: #d4d4d4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    #file-list li.file .file-name { flex: 1; min-width: 0; }
    #file-list .view-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      background: #007acc;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    #file-list .view-btn:hover { background: #0090e0; }
    #file-list li.empty {
      color: #888;
      font-style: italic;
    }
    .sidebar-btn {
      padding: 10px 14px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      background: #007acc;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }
    .sidebar-btn:hover { background: #0090e0; }
    .sidebar-btn.danger { background: #5a2d2d; color: #f48771; }
    .sidebar-btn.danger:hover { background: #6b3a3a; }
    .sidebar-btn-secondary { background: #444; color: #ccc; }
    .sidebar-btn-secondary:hover { background: #555; }
    .sidebar-btn-success { background: #28a745; margin-top: 8px; }
    .sidebar-btn-success:hover { background: #34c759; }
    .sidebar-btn-export { background: #6a1b9a; margin-top: 10px; }
    .sidebar-btn-export:hover { background: #7b2c9e; }
    .sidebar-hr { border: 0; border-top: 1px solid #444; margin: 12px 0; }
    #folder-list, #exclude-list { list-style: none; padding: 0; margin: 0 0 8px 0; font-size: 12px; color: #aaa; max-height: 80px; overflow-y: auto; }
    #exclude-list { color: #f48771; }
    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.6;
    }
    #chat b { color: #7eb8da; }
    #chat pre.doc-preview {
      margin: 8px 0;
      padding: 12px;
      background: #2d2d2d;
      border-radius: 4px;
      white-space: pre-wrap;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
    }
    #chat .doc-preview.markdown-body {
      margin: 8px 0;
      padding: 12px;
      background: #2d2d2d;
      border-radius: 4px;
      font-size: 14px;
      max-height: 400px;
      overflow-y: auto;
      line-height: 1.5;
    }
    #chat .markdown-body h1, #chat .markdown-body h2, #chat .markdown-body h3 { margin-top: 1em; color: #9cdcfe; }
    #chat .markdown-body h1 { font-size: 1.4em; }
    #chat .markdown-body h2 { font-size: 1.2em; }
    #chat .markdown-body h3 { font-size: 1.1em; }
    #chat .markdown-body code { background: #1e1e1e; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
    #chat .markdown-body pre { background: #1e1e1e; padding: 10px; border-radius: 4px; overflow-x: auto; }
    #chat .markdown-body pre code { padding: 0; background: none; }
    #chat .markdown-body ul, #chat .markdown-body ol { margin: 0.5em 0; padding-left: 1.5em; }
    #chat .markdown-body blockquote { border-left: 3px solid #007acc; margin: 0.5em 0; padding-left: 1em; color: #aaa; }
    #chat .markdown-body a { color: #7eb8da; }
    #input-area {
      display: flex;
      padding: 15px;
      background: #2d2d2d;
      gap: 10px;
    }
    #query {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #404040;
      border-radius: 6px;
      background: #3d3d3d;
      color: #fff;
      font-size: 15px;
    }
    #query::placeholder { color: #888; }
    #query:focus {
      outline: none;
      border-color: #007acc;
    }
    #send {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      background: #007acc;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    #send:hover:not(:disabled) { background: #0090e0; }
    button:disabled {
      background: #555;
      cursor: not-allowed;
      opacity: 0.8;
    }
    #context-viewer {
      display: none;
      background: #252526;
      border-top: 2px solid #007acc;
      height: 180px;
      overflow-y: auto;
      padding: 10px;
      font-size: 12px;
      color: #aaa;
    }
    #context-viewer .context-viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: #ccc;
    }
    #context-viewer .token-bar-wrap {
      width: 100%;
      background: #333;
      height: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    #context-viewer #token-bar {
      width: 0%;
      background: #007acc;
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }
    #context-viewer #token-bar.high-usage { background: #cc3300; }
    #context-viewer #token-stats {
      margin-bottom: 8px;
      font-weight: bold;
      color: #007acc;
    }
    #context-viewer .context-viewer-close {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      line-height: 1;
    }
    #context-viewer .context-viewer-close:hover { color: #7eb8da; }
    #context-content { white-space: pre-wrap; word-break: break-all; }
    #context-content .context-path { margin-bottom: 4px; }
    #llm-offline-banner {
      display: none;
      padding: 10px 14px;
      background: #5a2d2d;
      color: #f48771;
      font-size: 13px;
      border-bottom: 1px solid #7a3d3d;
    }
    #llm-offline-banner.show { display: block; }
    #llm-offline-banner .banner-dismiss { float: right; background: none; border: none; color: #f48771; cursor: pointer; font-size: 18px; }
    #pinned-list { list-style: none; padding: 0; margin: 0 0 8px 0; font-size: 12px; color: #9cdcfe; max-height: 60px; overflow-y: auto; }
    #pinned-list li { display: flex; align-items: center; justify-content: space-between; gap: 4px; padding: 4px 0; }
    #pinned-list .unpin-btn { padding: 2px 6px; font-size: 11px; background: #444; color: #ccc; border: none; border-radius: 3px; cursor: pointer; }
    .file-list .pin-btn { padding: 4px 8px; font-size: 11px; background: #444; color: #9cdcfe; border: none; border-radius: 3px; cursor: pointer; }
    .file-list .pin-btn.pinned { background: #0e639c; color: #fff; }
    #context-content .context-path { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    #context-content .context-path span { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    #context-content .context-pin-btn { flex-shrink: 0; padding: 2px 8px; font-size: 11px; background: #444; color: #9cdcfe; border: none; border-radius: 3px; cursor: pointer; }
    #context-content .context-pin-btn:hover:not(:disabled) { background: #555; }
    #context-content .context-pin-btn:disabled { opacity: 0.8; cursor: default; color: #6a9fb5; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>External folders</h3>
    <ul id="folder-list"></ul>
    <button id="add-folder-btn" class="sidebar-btn">Add folder to index</button>
    <hr class="sidebar-hr" />
    <h3>Exclusions</h3>
    <ul id="exclude-list"></ul>
    <button id="add-exclude-btn" class="sidebar-btn sidebar-btn-secondary">Add exclusion</button>
    <button id="rebuild-btn" class="sidebar-btn sidebar-btn-success">Rebuild index</button>
    <hr class="sidebar-hr" />
    <h3>Pinned to context</h3>
    <ul id="pinned-list"></ul>
    <hr class="sidebar-hr" />
    <h3>Data files</h3>
    <input type="text" id="file-search" placeholder="Search files..." />
    <ul id="file-list"></ul>
    <button id="upload-btn" class="sidebar-btn">Upload file</button>
    <button id="clear-btn" class="sidebar-btn danger">Clear history</button>
    <button id="export-btn" class="sidebar-btn sidebar-btn-export">Export planning doc</button>
  </div>
  <div id="main-area">
    <div id="llm-offline-banner" role="alert">
      <span>LLM unavailable — ensure llamacpp-droid is running (e.g. port 8080).</span>
      <button type="button" class="banner-dismiss" title="Dismiss">&#215;</button>
    </div>
    <div id="chat"></div>
    <div id="context-viewer">
      <div class="context-viewer-header">
        <strong>Active context &amp; token usage</strong>
        <button type="button" id="context-viewer-close" class="context-viewer-close" title="Close">&#215;</button>
      </div>
      <div class="token-bar-wrap">
        <div id="token-bar"></div>
      </div>
      <div id="token-stats">Tokens: — / 8192 (est.)</div>
      <div id="context-content"></div>
    </div>
    <div id="input-area">
      <input type="text" id="query" placeholder="Ask about your docs or plan a project..." autofocus />
      <button id="send">Send</button>
    </div>
  </div>
  <script src="node_modules/marked/lib/marked.umd.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
